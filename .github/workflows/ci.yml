name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 123Password
          POSTGRES_DB: pokedex
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci
      - run: npx prisma db push
        working-directory: packages/backend
        env:
          DATABASE_URL: postgresql://postgres:123Password@localhost:5432/pokedex
          NODE_ENV: test

      - run: npm run lint -w packages/backend
      - run: npm run typecheck -w packages/backend
      - run: npm run test -w packages/backend
        env:
          DATABASE_URL: postgresql://postgres:123Password@localhost:5432/pokedex

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci
      - run: npm run lint -w packages/frontend
      - run: npm run typecheck -w packages/frontend
      - run: npm run test -w packages/frontend

  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 123Password
          POSTGRES_DB: pokedex
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci
      - run: npx prisma db push
        working-directory: packages/backend
        env:
          DATABASE_URL: postgresql://postgres:123Password@localhost:5432/pokedex
          NODE_ENV: test

      - run: npx playwright install --with-deps chromium
        working-directory: packages/e2e

      - name: Start backend
        run: |
          npm run dev -w packages/backend &
          sleep 3
        env:
          DATABASE_URL: postgresql://postgres:123Password@localhost:5432/pokedex
          JWT_SECRET: test-secret
          NODE_ENV: test

      - name: Start frontend
        run: |
          npm run dev -w packages/frontend &
          sleep 3

      - run: npm run test -w packages/e2e
