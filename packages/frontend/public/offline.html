<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #CC1F1F;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .card { max-width: 350px; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p { font-size: 0.875rem; opacity: 0.8; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're offline</h1>
    <p>Connect to the internet to use the Pokédex. Your data will sync when you're back online.</p>
  </div>
</body>
</html>
